[Controls]
fullscreen=true

[Renderer]
backend={{renderer_backend}}
resolution_setup={{render_scale}}
use_vsync={{vsync}}
use_asynchronous_gpu_emulation=true
accelerate_astc=true

[Core]
cpu_accuracy=Auto
cpuopt_unsafe_unfuse_fma=true
cpuopt_unsafe_reduce_fp_error=true

[Multicore]
use_multi_core=true
cpu_threads={{cpu_threads}}

[Textures]
texture_filtering={{texture_filtering}}
